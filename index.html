<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>訂單輸入系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>每日訂單輸入</h2>
    <input type="number" id="pid" placeholder="產品 ID">
    <input type="number" id="start" placeholder="開始碼">
    <input type="number" id="end" placeholder="結束碼">
    <button id="submitBtn">送出訂單</button>

    <script>
        // 確保變數名稱唯一且不重複
        (function() {
            const url = 'https://mnmjachbccxrklkfquhe.supabase.co';
            const key = 'sb_publishable_51H9VYMb3KFPCIfoAQa5qA__1xoa7Sz';
            
            // 使用視窗全域變數確保只有一份實例
            window.mySupabase = supabase.createClient(url, key);

            document.getElementById('submitBtn').addEventListener('click', async () => {
                const pid = document.getElementById('pid').value;
                const start = document.getElementById('start').value;
                const end = document.getElementById('end').value;

                try {
                    const { error } = await window.mySupabase.from('orders').insert([
                        { 
                            product_id: parseInt(pid), 
                            start_code: parseInt(start), 
                            end_code: parseInt(end) 
                        }
                    ]);

                    if (error) throw error;
                    
                    alert('訂單已儲存！');
                    document.getElementById('pid').value = '';
                    document.getElementById('start').value = '';
                    document.getElementById('end').value = '';
                } catch (err) {
                    alert('系統錯誤: ' + err.message);
                }
            });
        })();
    </script>
</body>
</html>
