<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>訂單輸入系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input { display: block; width: 100%; margin: 10px 0; padding: 8px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>每日訂單輸入</h2>
    <input type="number" id="pid" placeholder="產品 ID (product_id)">
    <input type="number" id="start" placeholder="開始碼 (start_code)">
    <input type="number" id="end" placeholder="結束碼 (end_code)">
    <button onclick="saveOrder()">送出訂單</button>

    <script>
        // 請將以下兩行替換成你 Supabase 的實際資訊
        const supabaseUrl = 'https://mnmjachbccxrklkfquhe.supabase.co';
        const supabaseKey = 'sb_publishable_51H9VYMb3KFPCIfoAQa5qA__1xoa7Sz';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function saveOrder() {
            const pid = document.getElementById('pid').value;
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;

            const { data, error } = await supabase.from('orders').insert([
                { product_id: pid, start_code: start, end_code: end }
            ]);

            if (error) {
                alert('系統錯誤: ' + error.message);
            } else {
                alert('訂單已儲存！');
                document.getElementById('pid').value = '';
                document.getElementById('start').value = '';
                document.getElementById('end').value = '';
            }
        }
    </script>
</body>
</html>
