<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>訂單輸入系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>每日訂單輸入</h2>
    
    <div class="form-group">
        <label>選擇產品</label>
        <select id="productSelect">
            <option value="">請選擇產品...</option>
        </select>
    </div>

    <div class="form-group">
        <label>開始碼 / 結束碼</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="start" placeholder="開始碼">
            <input type="number" id="end" placeholder="結束碼">
        </div>
    </div>

    <!-- 改回 text 輸入框，讓員工自由填寫 -->
    <div class="form-group">
        <label>狀態 / 訂單備註 / 注意事項</label>
        <input type="text" id="statusInput" placeholder="例如：訂單編號 #12345，需急件處理...">
    </div>
    
    <button id="submitBtn">送出訂單</button>

    <script>
        (function() {
            const url = 'https://mnmjachbccxrklkfquhe.supabase.co';
            const key = 'sb_publishable_51H9VYMb3KFPCIfoAQa5qA__1xoa7Sz';
            window.mySupabase = supabase.createClient(url, key);

            // 載入產品選單
            async function loadProducts() {
                const { data } = await window.mySupabase.from('products').select('id, product_name');
                if (data) {
                    const select = document.getElementById('productSelect');
                    data.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p.id;
                        opt.textContent = `${p.id} - ${p.product_name}`;
                        select.appendChild(opt);
                    });
                }
            }
            loadProducts();

            document.getElementById('submitBtn').addEventListener('click', async () => {
                const pid = document.getElementById('productSelect').value;
                const start = document.getElementById('start').value;
                const end = document.getElementById('end').value;
                const status = document.getElementById('statusInput').value; // 獲取輸入的文字

                if(!pid || !start || !end) return alert('請填寫完整資訊');

                try {
                    const { error } = await window.mySupabase.from('orders').insert([
                        { 
                            product_id: parseInt(pid), 
                            start_code: parseInt(start), 
                            end_code: parseInt(end),
                            status: status, // 存入自定義文字
                            quantity: parseInt(end) - parseInt(start) + 1 
                        }
                    ]);

                    if (error) throw error;
                    alert('訂單已儲存！');
                    
                    // 清空欄位
                    document.getElementById('statusInput').value = '';
                    document.getElementById('start').value = '';
                    document.getElementById('end').value = '';
                } catch (err) {
                    alert('系統錯誤: ' + err.message);
                }
            });
        })();
    </script>
</body>
</html>
